# Explicit JS members only. `packages/` also holds the six first-party Python
# packages (estormi_server, memory_core, …) — not pnpm packages — so list the
# real JS workspaces explicitly rather than globbing `packages/*`.
packages:
  - "packages/ui-kit"
  - "packages/web-ui"
# Single source for the versions shared by the two JS workspaces (web-ui +
# ui-kit). Both reference these as `catalog:` so React / TypeScript / vitest
# can never drift between the design system and the SPA — the repo has been
# bitten by a stale ui-kit before. pnpm 9.5+ feature.
catalog:
  react: "^18.3.1"
  react-dom: "^18.3.1"
  "@types/react": "^18.2.0"
  "@types/react-dom": "^18.2.0"
  "@testing-library/react": "^16.3.2"
  typescript: "^6.0.3"
  vitest: "^3.2.6"
  happy-dom: "^20.10.6"
# Supply-chain hardening for the public repo: pin transitive deps up to their
# patched release (Dependabot alerts). Each `<x` form only rewrites resolutions
# below the patched line, staying within the dependency's current major so
# nothing breaks; drop an entry once every dependent's own range has moved past
# it. (pnpm 10/11 reads overrides here, not the package.json `pnpm` field.)
#   - esbuild <0.25.0  — dev-server request SSRF (GHSA-67mh-4wv8-2f99); vite 6
#     already resolves >=0.25, so this is now a defensive floor.
#   - ws <8.21.0       — memory-exhaustion DoS from tiny fragments (high).
#   - js-yaml <4.2.0   — quadratic-complexity DoS in merge-key handling.
#   - @babel/core <7.29.6 — arbitrary file read via sourceMappingURL comment.
overrides:
  esbuild: ">=0.25.0"
  "ws@<8.21.0": ">=8.21.0"
  "js-yaml@<4.2.0": ">=4.2.0"
  "@babel/core@<7.29.6": ">=7.29.6 <8"
allowBuilds:
  esbuild: true
