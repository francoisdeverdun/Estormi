<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 32" role="img" aria-labelledby="title desc">
  <title id="title">Estormi wordmark</title>
  <desc id="desc">Estormi wordmark in gold gradient Cinzel caps for dark surfaces.</desc>
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#DCBA8A"/>
      <stop offset="60%" stop-color="#C8A96B"/>
      <stop offset="100%" stop-color="#8A6A30"/>
    </linearGradient>
  </defs>
  <text x="0" y="24" font-family="Cinzel, 'Trajan Pro', Georgia, serif" font-weight="700"
        font-size="22" fill="url(#gold)" letter-spacing="3">ESTORMI</text>
</svg>
