<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-labelledby="title desc">
  <title id="title">Estormi mark (dark)</title>
  <desc id="desc">The blocked illuminated initial for dark surfaces: a gold gradient Cinzel E on a burgundy ground inside a gold keyline. The mark carries its own ground, so it reads on any surface.</desc>
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE9B8"/>
      <stop offset="40%" stop-color="#DCBA8A"/>
      <stop offset="75%" stop-color="#C8A96B"/>
      <stop offset="100%" stop-color="#8A6A30"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100" height="100" rx="20" ry="20" fill="#6E1F2E"/>
  <rect x="7.75" y="7.75" width="84.5" height="84.5" rx="15" ry="15"
        fill="none" stroke="url(#gold)" stroke-width="5.5"/>
  <text x="50" y="50.5" text-anchor="middle" dominant-baseline="central"
        font-family="Cinzel, Georgia, serif" font-weight="700" font-size="60"
        fill="url(#gold)" stroke="rgba(0,0,0,0.3)" stroke-width="0.4"
        style="paint-order:stroke fill">E</text>
</svg>
