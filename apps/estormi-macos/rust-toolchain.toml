# Estormi requires a NIGHTLY Rust toolchain: a transitive dependency
# (wacore-binary, pulled in via the WhatsApp connector path) uses the unstable
# `portable_simd` feature, which is only available on nightly. Do NOT switch
# this to `stable` — the build will not compile.
#
# Pinned to a specific nightly date for reproducible builds: an unpinned
# `nightly` floats to whatever the runner downloads that day, so a green build
# today can break tomorrow on an unrelated compiler change. Bump deliberately.
[toolchain]
channel = "nightly-2026-05-01"
