name: QA

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'assets/badges/**'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'assets/badges/**'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  CMAKE_ARGS: "-DGGML_METAL=OFF -DGGML_CUDA=OFF"

jobs:
  python-lint:
    name: Python lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install lint dependencies
        run: pip install ruff==0.15.16

      # Delegate to the Makefile so the lint surface has one source of truth.
      - name: Ruff check + format check
        run: make lint

  python-typecheck:
    name: Python typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/requirements.lock

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # pyright's import resolution reads pyproject `venvPath`/`venv` (= ./.venv),
      # so type-check against the same interpreter+packages the app runs on —
      # not an ambient pip env. Mirrors `make typecheck` locally.
      - name: Install dependencies into .venv (pinned lock)
        run: |
          python -m venv .venv
          .venv/bin/pip install --require-hashes -r requirements/requirements.lock

      - name: Pyright
        run: .venv/bin/pyright

  python-unit:
    name: Python tests / unit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/requirements.lock

      - name: Install dependencies (pinned lock)
        run: pip install --require-hashes -r requirements/requirements.lock

      - name: Run unit tests
        run: make test-unit

  python-integration:
    name: Python tests / integration
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/requirements.lock

      - name: Install dependencies (pinned lock)
        run: pip install --require-hashes -r requirements/requirements.lock

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11

      - name: Build SPA bundle
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @estormi/web-ui build

      - name: Run integration tests
        run: make test-integration

  python-e2e:
    name: Python tests / e2e
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/requirements.lock

      - name: Install dependencies (pinned lock)
        run: pip install --require-hashes -r requirements/requirements.lock

      # fastembed downloads its ONNX models from Hugging Face on first use and
      # caches them under the ephemeral $TMPDIR by default — so pin the cache
      # to a stable path (FASTEMBED_CACHE_PATH below) and persist it, plus the
      # HF hub cache, across runs. Keys on requirements/requirements.lock so a fastembed
      # bump refreshes the models.
      - name: Cache embedding models
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/fastembed
            ~/.cache/huggingface
          key: embed-models-${{ runner.os }}-${{ hashFiles('requirements/requirements.lock') }}
          restore-keys: |
            embed-models-${{ runner.os }}-

      - name: Run E2E tests
        run: FASTEMBED_CACHE_PATH="$HOME/.cache/fastembed" make test-e2e

  python-contract:
    name: Repository contracts / docs and CI
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/requirements.lock

      - name: Install dependencies (pinned lock)
        run: pip install --require-hashes -r requirements/requirements.lock

      # The schema.d.ts contract (tests/contract/test_schema_dts_current.py)
      # regenerates the TS types with web-ui's openapi-typescript and fails
      # loudly in CI if Node / the generator is missing — so install them here.
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11

      - name: Install JS deps (provides openapi-typescript)
        run: pnpm install --frozen-lockfile

      - name: Run repository contract tests
        run: make test-contract

  frontend:
    name: Frontend / web-ui
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The TS API types are generated from the committed OpenAPI spec
      # (docs/specs/openapi.json, itself pinned to the app by a contract
      # test). Regenerate and fail if the committed schema.d.ts is stale — the
      # spec→TS half of the build-time drift guard. Fix: `make openapi`.
      - name: Check generated API types are current
        run: |
          pnpm --filter @estormi/web-ui gen:api
          git diff --exit-code packages/web-ui/src/api/schema.d.ts

      - name: Vitest unit + component tests with coverage
        run: pnpm --filter @estormi/web-ui test:coverage

      - name: Install Playwright browser
        run: pnpm --filter @estormi/web-ui exec playwright install --with-deps chromium

      - name: Playwright e2e (stubbed backend)
        run: make test-e2e-frontend

  runtime-suite:
    name: Runtime suite / hermetic
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/requirements.lock

      - name: Install dependencies (pinned lock)
        run: |
          pip install --require-hashes -r requirements/requirements.lock
          # The hermetic suite launches a real server subprocess, which (unlike
          # the pytest jobs' conftest sys.path shim) imports memory_core as an
          # installed package. Install it editable, matching scripts/setup.sh.
          # --no-deps: every dependency is already pinned by the lock above.
          pip install -e packages/memory_core --no-deps
          pip install -e packages/connectors --no-deps
          # The hermetic server subprocess also imports estormi_server and the
          # engine packages; install them editable too (the conftest sys.path
          # shim does not reach a server launched outside pytest).
          pip install -e packages/estormi_server --no-deps
          pip install -e packages/estormi_ingestion --no-deps
          pip install -e packages/estormi_briefing --no-deps
          pip install -e packages/estormi_distill --no-deps

      # The hermetic suite seeds synthetic sources, which embeds them via
      # fastembed's ONNX model. Mirror the e2e job: cache the model (downloaded
      # from Hugging Face on first use) and pin its path, otherwise the seed
      # steps fail and every downstream search check fails with them.
      - name: Cache embedding models
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/fastembed
            ~/.cache/huggingface
          key: embed-models-${{ runner.os }}-${{ hashFiles('requirements/requirements.lock') }}
          restore-keys: |
            embed-models-${{ runner.os }}-

      - name: Run hermetic runtime suite
        run: FASTEMBED_CACHE_PATH="$HOME/.cache/fastembed" make test-suite

  python-full:
    name: Python tests / full coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Coverage + badge commit only runs on pushes to main.
    # PRs already get signal from the split unit/integration/e2e/contract jobs;
    # running pytest a second time on every PR doubled the CI bill.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/requirements.lock

      - name: Install dependencies (pinned lock)
        run: pip install --require-hashes -r requirements/requirements.lock

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11

      - name: Build SPA bundle
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @estormi/web-ui build

      - name: Run full pytest suite
        run: mkdir -p build/coverage && pytest tests/ --tb=short -q --cov=estormi_server --cov=memory_core --cov=connectors --cov=estormi_ingestion --cov=estormi_briefing --cov=estormi_distill --cov-report=term-missing --cov-report=json:build/coverage/coverage.json --cov-fail-under=80 --junitxml=test-results.xml

      - name: Generate QA badges
        run: python scripts/qa_metrics.py build/coverage/coverage.json assets/badges --metrics-json qa-metrics.json

      - name: Upload pytest report
        uses: actions/upload-artifact@v7
        with:
          name: pytest-report
          path: test-results.xml

      - name: Upload coverage and badges
        uses: actions/upload-artifact@v7
        with:
          name: qa-metrics
          path: |
            build/coverage/coverage.json
            qa-metrics.json
            assets/badges/coverage.svg
            assets/badges/tests.svg
            assets/badges/qa-layers.svg

      # QA badges are NOT pushed from CI. They ride in the `qa-metrics` artifact
      # above; the maintainer regenerates and commits them locally via
      # `make test-metrics`. A CI push would fail anyway: a push-event checkout
      # is in detached-HEAD (bare `git push` has no branch), and `main` is
      # protection-gated (PR-only, enforce_admins) with no PAT/deploy key here.
