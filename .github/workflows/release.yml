name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  CMAKE_ARGS: "-DGGML_METAL=OFF -DGGML_CUDA=OFF"

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install ruff==0.15.16
      # Delegate to the Makefile so the lint surface has one source of truth.
      - run: make lint

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements/requirements.lock
      - run: pip install --require-hashes -r requirements/requirements.lock
      # Mirror the curated gate (Makefile `test`): the performance benchmarks are
      # wall-clock thresholds run via `make test-performance`, not release gates.
      - run: pytest tests/ -m 'not performance' --tb=short -q

  build-dmg:
    runs-on: macos-14
    needs: [lint, test]
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7

      # Estormi requires NIGHTLY Rust (portable_simd in the wacore-binary dep);
      # the exact nightly is pinned in apps/estormi-macos/rust-toolchain.toml. Install
      # that toolchain explicitly here so the effective compiler is visible and
      # not whatever `@stable` would have pulled (cargo runs from apps/estormi-macos/ and
      # honors the directory toolchain file regardless).
      - name: Install Rust (nightly, aarch64-apple-darwin)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch (action code only; toolchain comes from rust-toolchain.toml)
        with:
          toolchain: nightly-2026-05-01
          targets: aarch64-apple-darwin

      - name: Show effective Rust toolchain
        working-directory: apps/estormi-macos
        run: rustup show active-toolchain

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: apps/estormi-macos -> target

      - name: Cache cargo-tauri binary
        id: cache-tauri-cli
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-tauri
          key: cargo-tauri-v2-${{ runner.os }}-${{ runner.arch }}

      - name: Install tauri-cli
        if: steps.cache-tauri-cli.outputs.cache-hit != 'true'
        run: cargo install tauri-cli --version "^2" --locked

      - name: Write build version (tag → packages/estormi_server/build_version.txt)
        env:
          # Pass the tag through the environment rather than interpolating it
          # into the shell — a context value spliced into a `run:` block is the
          # classic Actions script-injection sink.
          REF_NAME: ${{ github.ref_name }}
        run: |
          # The packaged UI footer reads this file. Write the pushed tag so
          # the published bundle reports the right release without depending
          # on `git describe` running inside the Tauri build.
          printf "%s\n" "$REF_NAME" > packages/estormi_server/build_version.txt
          cat packages/estormi_server/build_version.txt

      - name: Stage bundled resource directories
        run: |
          # `python/` is intentionally empty in CI — the released DMG ships
          # WITHOUT a bundled Python interpreter. End-users run
          # `make bundle-python` locally (from a source clone at the same tag)
          # to populate it. The directory must exist for `tauri build` because
          # tauri.conf.json lists it under bundle.resources.
          mkdir -p python

      # The DMG bundles the built SPA (tauri.conf.json `frontendDist` points at
      # packages/web-ui/dist, which is gitignored). `cargo tauri build` does NOT
      # run `beforeDevCommand`, so the SPA must be built explicitly here — exactly
      # as `make bundle` does locally via its `frontend-build` target. Without this
      # the build fails on the missing frontendDist directory on a fresh checkout.
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11

      - name: Build web-ui SPA (frontendDist)
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @estormi/web-ui build

      - name: Build macOS DMG
        working-directory: apps/estormi-macos
        run: cargo tauri build --target aarch64-apple-darwin --bundles dmg

      - name: Rename DMG to stable filename and compute checksum
        id: dmg
        working-directory: apps/estormi-macos/target/aarch64-apple-darwin/release/bundle/dmg
        run: |
          DMG=$(ls *.dmg | head -1)
          cp "$DMG" Estormi.dmg
          # SHA-256 lets users verify the download against the published digest.
          shasum -a 256 Estormi.dmg > Estormi.dmg.sha256
          cat Estormi.dmg.sha256
          # Expose the bare hash for the release body.
          echo "sha256=$(awk '{print $1}' Estormi.dmg.sha256)" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          name: Estormi ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            apps/estormi-macos/target/aarch64-apple-darwin/release/bundle/dmg/Estormi.dmg
            apps/estormi-macos/target/aarch64-apple-darwin/release/bundle/dmg/Estormi.dmg.sha256
          body: |
            **Unsigned, not Apple-notarized.** Estormi is distributed directly
            (not via the Mac App Store), so the DMG is not notarized. On first
            launch macOS Gatekeeper will warn; open it via right-click → Open, or
            `xattr -dr com.apple.quarantine /Applications/Estormi.app`. Verify the
            download against the digest below before opening.

            **SHA-256 (Estormi.dmg):**
            `${{ steps.dmg.outputs.sha256 }}`
            (also published as the `Estormi.dmg.sha256` asset).

            **Full Disk Access required.** Estormi reads local sources (e.g.
            Messages); grant it in System Settings → Privacy & Security → Full
            Disk Access after installing.

            **Shell-only release — bundle Python locally.**

            This DMG ships without a bundled Python runtime. After installing
            Estormi.app, populate `python/` by running, from a clone of the
            source repo at the same tag:

            ```
            make bundle-python PYTHON_STANDALONE_SHA256=<sha256>
            ```

            The SHA256 for each release is published on the GitHub Releases page
            alongside the DMG and in the `Estormi.dmg.sha256` asset.
