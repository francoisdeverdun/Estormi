name: JS

on:
  push:
    branches: [main]
    paths:
      - 'packages/ui-kit/**'
      - 'packages/web-ui/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/js.yml'
  pull_request:
    paths:
      - 'packages/ui-kit/**'
      - 'packages/web-ui/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/js.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  js-workspace:
    name: JS workspace / lint + typecheck + tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11

      - name: Get pnpm store dir
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v6
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (web-ui)
        run: pnpm --filter @estormi/web-ui lint

      - name: Typecheck (all packages)
        run: pnpm -r typecheck

      - name: Test (all packages)
        run: pnpm -r test

      - name: Install Playwright browsers (Chromium)
        run: pnpm --filter @estormi/web-ui exec playwright install --with-deps chromium

      - name: E2E (web-ui Playwright, stubbed backend)
        run: pnpm --filter @estormi/web-ui test:e2e
